<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AWS EC2 DevOps Demo</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: rgba(0, 0, 0, 0.65);
        padding: 50px;
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        text-align: center;
        width: 420px;
      }

      h1 {
        font-size: 38px;
        margin-bottom: 10px;
      }

      .info {
        margin-top: 20px;
        font-size: 18px;
        line-height: 1.8;
      }

      .label {
        color: #00e6e6;
        font-weight: bold;
      }

      .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 30px;
        background: #ff6a00;
        color: white;
        text-decoration: none;
        border-radius: 25px;
        font-size: 16px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #ff8800;
        transform: scale(1.05);
      }

      footer {
        margin-top: 30px;
        font-size: 14px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚀 EC2 Server is Live</h1>

      <p>This Apache server is successfully running on AWS EC2.</p>

      <div class="info">
        <p><span class="label">Hostname:</span> '"$(hostname)"'</p>

        <p><span class="label">Private IP:</span> '"$(hostname -I)"'</p>
      </div>

      <p>Deployed by <strong>Hamza Sarfraz</strong></p>

      <a href="#" class="btn">AWS DevOps Project</a>

      <footer>© 2026 | AWS EC2 + Apache Deployment</footer>
    </div>
  </body>
</html>
